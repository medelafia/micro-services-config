
spring.datasource.url=jdbc:mysql://${ACCOUNT_SERVICE_DB_HOST}:3306/${ACCOUNT_SERVICE_DB_NAME}?createDatabaseIfNotExist=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${ACCOUNT_SERVICE_DB_USERNAME}
spring.datasource.password=${ACCOUNT_SERVICE_DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoints.web.base-path=/actuator


spring.kafka.bootstrap-servers=localhost:9092

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer


spring.kafka.producer.properties.spring.json.add.type.headers=false