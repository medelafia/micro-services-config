
## ACTUATOR CONFIGURATION

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoints.web.base-path=/actuator

## KAFKA CONFIGURATION
spring.kafka.bootstrap-servers=localhost:9092

spring.kafka.consumer.group-id=notification-group

spring.kafka.consumer.auto-offset-reset=earliest

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.consumer.properties.spring.json.trusted.packages=*

spring.kafka.consumer.properties.spring.json.use.type.headers=false

spring.kafka.consumer.properties.spring.json.value.default.type=com.notificationservice.events.NotificationEvent


spring.mail.host=${NOTIFICATION_SERVICE_SMTP_HOST}
spring.mail.port=587
spring.mail.username=${NOTIFICATION_SERVICE_USERNAME}
spring.mail.password=${NOTIFICATION_SERVICE_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true