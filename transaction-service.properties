
spring.datasource.url=jdbc:mysql://${TRANSACTION_SERVICE_DB_HOST}:3306/${TRANSACTION_SERVICE_DB_NAME}?createDatabaseIfNotExist=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${TRANSACTION_SERVICE_DB_USERNAME}
spring.datasource.password=${TRANSACTION_SERVICE_DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoints.web.base-path=/actuator

spring.kafka.bootstrap-servers=${TRANSACTION_SERVICE_KAFKA_SERVER_HOST}:9092
# Configuration du CONSOMMATEUR (celui qui lit les messages)
spring.kafka.consumer.group-id=transaction-group
# Commence ŕ lire depuis le début du topic si aucun offset n'est sauvegardé
spring.kafka.consumer.auto-offset-reset=earliest
# Désérialiseurs pour convertir les bytes en objets Java
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
# Configuration de la désérialisation JSON
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.value.default.type=com.transactionservice.events.TransactionCreatedEvent